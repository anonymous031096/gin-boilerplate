basePath: /
definitions:
  http.APIResponse:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  iam.CreateRoleRequest:
    properties:
      code:
        type: string
      name:
        type: string
      permissionIds:
        items:
          type: string
        type: array
    required:
    - code
    - name
    type: object
  iam.RefreshRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  iam.SignInRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  iam.SignUpRequest:
    properties:
      email:
        type: string
      fullName:
        type: string
      password:
        type: string
    required:
    - email
    - fullName
    - password
    type: object
  iam.UpdateRoleRequest:
    properties:
      name:
        type: string
      permissionIds:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  iam.UpdateUserRequest:
    properties:
      fullName:
        type: string
    required:
    - fullName
    type: object
  product.CreateProductRequest:
    properties:
      description:
        type: string
      name:
        type: string
      price:
        type: integer
    required:
    - name
    - price
    type: object
  product.UpdateProductRequest:
    properties:
      description:
        type: string
      name:
        type: string
      price:
        type: integer
    required:
    - name
    - price
    type: object
info:
  contact: {}
  description: Enterprise boilerplate API with IAM and Product modules.
  title: Gin Boilerplate API
  version: "1.0"
paths:
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/iam.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.APIResponse'
        "401":
