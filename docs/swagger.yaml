basePath: /api
definitions:
  gin-boilerplate_internal_iam_dto.CreateRoleRequest:
    properties:
      name:
        type: string
      permissionIds:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - name
    - permissionIds
    type: object
  gin-boilerplate_internal_iam_dto.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      roleIds:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - email
    - name
    - password
    - roleIds
    type: object
  gin-boilerplate_internal_iam_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  gin-boilerplate_internal_iam_dto.PaginationMeta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  gin-boilerplate_internal_iam_dto.PermissionResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  gin-boilerplate_internal_iam_dto.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  gin-boilerplate_internal_iam_dto.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    required:
    - email
    - name
    - password
    type: object
  gin-boilerplate_internal_iam_dto.RoleResponse:
    properties:
      id:
        type: string
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/gin-boilerplate_internal_iam_dto.PermissionResponse'
        type: array
    type: object
  gin-boilerplate_internal_iam_dto.TokenResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  gin-boilerplate_internal_iam_dto.UpdateRoleRequest:
    properties:
      name:
        type: string
      permissionIds:
        items:
          type: string
        minItems: 1
        type: array
    type: object
  gin-boilerplate_internal_iam_dto.UpdateUserRequest:
    properties:
      name:
        type: string
      roleIds:
        items:
          type: string
        type: array
    type: object
  gin-boilerplate_internal_iam_dto.UserListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/gin-boilerplate_internal_iam_dto.UserResponse'
        type: array
      meta:
        $ref: '#/definitions/gin-boilerplate_internal_iam_dto.PaginationMeta'
    type: object
  gin-boilerplate_internal_iam_dto.UserResponse:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      roles:
        items:
          $ref: '#/definitions/gin-boilerplate_internal_iam_dto.UserRoleItem'
        type: array
      updatedAt:
        type: string
    type: object
  gin-boilerplate_internal_iam_dto.UserRoleItem:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  gin-boilerplate_internal_todo_dto.CreateTodoRequest:
    properties:
      description:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  gin-boilerplate_internal_todo_dto.PaginationMeta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  gin-boilerplate_internal_todo_dto.TodoListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/gin-boilerplate_internal_todo_dto.TodoResponse'
        type: array
      meta:
        $ref: '#/definitions/gin-boilerplate_internal_todo_dto.PaginationMeta'
    type: object
  gin-boilerplate_internal_todo_dto.TodoResponse:
    properties:
      completed:
        type: boolean
      createdAt:
        type: string
      createdBy:
        type: string
      description:
        type: string
      id:
        type: string
      title:
        type: string
      updatedAt:
        type: string
    type: object
  gin-boilerplate_internal_todo_dto.UpdateTodoRequest:
    properties:
      completed:
        type: boolean
      description:
        type: string
      title:
        type: string
    type: object
  gin-boilerplate_pkg_response.ErrorResponse:
    properties:
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Enterprise REST API boilerplate
  title: Gin Boilerplate API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Device ID
        in: header
        name: X-Device-Id
        type: string
      - description: Login
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gin-boilerplate_internal_iam_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_iam_dto.TokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_iam_dto.UserResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Device ID
        in: header
        name: X-Device-Id
        type: string
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gin-boilerplate_internal_iam_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_iam_dto.TokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      summary: Refresh token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Register
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gin-boilerplate_internal_iam_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      summary: Register
      tags:
      - Auth
  /roles:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/gin-boilerplate_internal_iam_dto.RoleResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List roles
      tags:
      - Roles
    post:
      consumes:
      - application/json
      parameters:
      - description: Create role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gin-boilerplate_internal_iam_dto.CreateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_iam_dto.RoleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create role
      tags:
      - Roles
  /roles/{id}:
    delete:
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete role
      tags:
      - Roles
    get:
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_iam_dto.RoleResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get role by ID
      tags:
      - Roles
    put:
      consumes:
      - application/json
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: string
      - description: Update role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gin-boilerplate_internal_iam_dto.UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_iam_dto.RoleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update role
      tags:
      - Roles
  /todos:
    get:
      parameters:
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_todo_dto.TodoListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List my todos
      tags:
      - Todos
    post:
      consumes:
      - application/json
      parameters:
      - description: Create todo
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gin-boilerplate_internal_todo_dto.CreateTodoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_todo_dto.TodoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create todo
      tags:
      - Todos
  /todos/{id}:
    delete:
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete todo
      tags:
      - Todos
    get:
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_todo_dto.TodoResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get todo by ID
      tags:
      - Todos
    put:
      consumes:
      - application/json
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: string
      - description: Update todo
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gin-boilerplate_internal_todo_dto.UpdateTodoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_todo_dto.TodoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update todo
      tags:
      - Todos
  /users:
    get:
      parameters:
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_iam_dto.UserListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - Users
    post:
      consumes:
      - application/json
      parameters:
      - description: Create user
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gin-boilerplate_internal_iam_dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_iam_dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create user
      tags:
      - Users
  /users/{id}:
    delete:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - Users
    get:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_iam_dto.UserResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - Users
    put:
      consumes:
      - application/json
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Update user
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/gin-boilerplate_internal_iam_dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-boilerplate_internal_iam_dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-boilerplate_pkg_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user
      tags:
      - Users
securityDefinitions:
  BearerAuth:
    description: Enter "Bearer {token}"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
